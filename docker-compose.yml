services:
  postgres:
    image: postgres:16-alpine
    container_name: ziqola-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ziqola_ams}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - appnet

  adminer:
    image: adminer:4
    container_name: ziqola-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - appnet

  minio:
    image: minio/minio:latest
    container_name: ziqola-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - appnet

  sessions-cron:
    image: alpine:3.20
    container_name: ziqola-sessions-cron
    restart: unless-stopped
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://host.docker.internal}:${PORT:-5000}
      CRON_SECRET: ${CRON_SECRET}
      SESSIONS_WINDOW_DAYS: ${SESSIONS_WINDOW_DAYS:-7}
      SESSIONS_CRON_SCHEDULE: ${SESSIONS_CRON_SCHEDULE:-0 1 * * *}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl > /dev/null
        echo "${SESSIONS_CRON_SCHEDULE} curl -sS -X POST ${BACKEND_URL}/sessions/generate -H 'x-cron-secret: ${CRON_SECRET}' -H 'Content-Type: application/json' -d '{\"windowDays\": ${SESSIONS_WINDOW_DAYS}}'" > /etc/crontabs/root
        crond -f -l 2

volumes:
  postgres_data:
  minio_data:

networks:
  appnet:
